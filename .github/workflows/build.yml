name: "Build kernels"

on:
  workflow_dispatch:

env:
  CONFIGURATION: "repos.json"
  OUT_DIR: "out"

jobs:
  set-repos:
    name: "Parse repos.json"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.matrix.outputs.repos }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Validate and generate matrix"
        id: matrix
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          test -f "${{ env.CONFIGURATION }}"
          jq -e '.' "${{ env.CONFIGURATION }}" >/dev/null
          echo "repos=$(jq -c '.' "${{ env.CONFIGURATION }}")" >> "$GITHUB_OUTPUT"

  build-kernel:
    name: "Build kernel"
    runs-on: ubuntu-latest
    needs: [set-repos]
    strategy:
      max-parallel: 2
      fail-fast: false
      matrix:
        repos: ${{ fromJSON(needs.set-repos.outputs.repos) }}
    env:
      kernelDir: ${{ matrix.repos.kernelSource.name }}_${{ matrix.repos.kernelSource.device }}
      kernelName: ${{ matrix.repos.kernelSource.name }}
      kernelRepo: ${{ matrix.repos.kernelSource.repo }}
      kernelBranch: ${{ matrix.repos.kernelSource.branch }}
      kernelDevice: ${{ matrix.repos.kernelSource.device }}
      DEFCONFIG_NAME: ${{ matrix.repos.kernelSource.device }}_defconfig
      withKernelSU: ${{ matrix.repos.withKernelSU }}
    steps:
      - name: "Create working dir"
        run: mkdir -p "${kernelDir}"

      - name: "Install prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc curl git zip jq \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libssl-dev libfl-dev lftp zstd wget

      - name: "Clone kernel source"
        working-directory: "./${{ env.kernelDir }}"
        run: git clone --recursive --branch "${kernelBranch}" "${kernelRepo}" "${kernelName}" --depth=1

      - name: "Get toolchains"
        working-directory: "./${{ env.kernelDir }}"
        env:
          toolchains: "${{ toJSON(matrix.repos.toolchains) }}"
        run: |
          count="$(jq 'length' <<<"$toolchains")"
          for ((i=0; i<count; i++)); do
            name="$(jq -r ".[$i].name" <<<"$toolchains")"
            repo="$(jq -r ".[$i].repo" <<<"$toolchains")"
            branch="$(jq -r ".[$i].branch" <<<"$toolchains")"
            git clone --recursive --branch "$branch" "$repo" "$name" --depth=1
            echo "$(pwd)/$name" >> "$GITHUB_PATH"
            echo "$(pwd)/$name/bin" >> "$GITHUB_PATH"
          done
          echo "Toolchains added to PATH."

      - name: "Set build args"
        id: args
        working-directory: "./${{ env.kernelDir }}"
        env:
          params: "${{ toJSON(matrix.repos.params) }}"
          extraParams: "${{ toJSON(matrix.repos.extraParams) }}"
        run: |
          THREADS="$(nproc --all)"
          ARCH="$(jq -r '.ARCH // ""' <<<"$params")"
          CROSS_COMPILE="$(jq -r '.CROSS_COMPILE // ""' <<<"$params")"
          CROSS_COMPILE_COMPAT="$(jq -r '.CROSS_COMPILE_COMPAT // ""' <<<"$params")"
          CLANG_TRIPLE="$(jq -r '.CLANG_TRIPLE // ""' <<<"$params")"
          AR="$(jq -r '.AR // ""' <<<"$params")"
          CC="$(jq -r '.CC // ""' <<<"$params")"

          echo "ARCH=$ARCH" >> "$GITHUB_ENV"

          args="-j${THREADS}"
          if [ -n "${{ env.OUT_DIR }}" ]; then
            mkdir -p "$(pwd)/${{ env.OUT_DIR }}"
            args="$args O=$(pwd)/${{ env.OUT_DIR }}"
          fi
          [ -n "$ARCH" ] && args="$args ARCH=$ARCH"
          [ -n "$CROSS_COMPILE" ] && args="$args CROSS_COMPILE=$CROSS_COMPILE"
          [ -n "$CLANG_TRIPLE" ] && args="$args CLANG_TRIPLE=$CLANG_TRIPLE"
          [ -n "$CROSS_COMPILE_COMPAT" ] && args="$args CROSS_COMPILE_ARM32=$CROSS_COMPILE_COMPAT"
          [ -n "$AR" ] && args="$args AR=$AR"
          [ -n "$CC" ] && args="$args CC=$CC"

          extra="$(jq -r 'to_entries | map(select(.value != "")) | map("\(.key)=\(.value)") | join(" ")' <<<"$extraParams")"
          echo "args=$args $extra" >> "$GITHUB_OUTPUT"

      - name: "Update KernelSU (optional)"
        if: ${{ env.withKernelSU == 'true' }}
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          rm -rf ./KernelSU ./drivers/kernelsu || true
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          echo -e "\nCONFIG_KPROBES=y" >> "./arch/${ARCH}/configs/${{ env.DEFCONFIG_NAME }}"
          echo -e "\nCONFIG_HAVE_KPROBES=y" >> "./arch/${ARCH}/configs/${{ env.DEFCONFIG_NAME }}"

      - name: "Build"
        working-directory: "./${{ env.kernelDir }}/${{ env.kernelName }}"
        run: |
          make "${{ env.DEFCONFIG_NAME }}" ${{ steps.args.outputs.args }}
          make ${{ steps.args.outputs.args }}

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.kernelName }}_${{ env.kernelDevice }}_out"
          path: "./${{ env.kernelDir }}/${{ env.kernelName }}/${{ env.OUT_DIR }}"
