name: NetHunter Kernel - OnePlus 10 Pro (NE2215) OOS 14

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: BUILD_CONFIG to use (default waipio)
        required: true
        default: kernel_platform/common/build.config.msm.waipio
      package_anykernel:
        description: Also package flashable AnyKernel3 zip
        required: false
        default: "true"
      ccachesize:
        description: ccache max size (e.g. 15G)
        required: false
        default: 100G # Updated cache size

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    env:
      # Build metadata
      KBUILD_BUILD_USER: "github-actions"
      KBUILD_BUILD_HOST: "github.com"
      # Paths pinned by manifest
      CLANG_DIR: kernel_platform/prebuilts-master/clang/host/linux-x86
      GCC_HOST_DIR: kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8
      DIST_DIR: out/msm-kernel/dist
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # Device labeling for artifacts
      DEVICE_CODENAME: "NE2215"
      DEVICE_FRIENDLY: "OnePlus10Pro"
      ANDROID_VERSION: "OOS14"

    steps:
      - name: Disk cleanup before starting
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache clang curl flex git jq libelf-dev \
            liblz4-tool libncurses5-dev libssl-dev lld llvm lsb-release \
            pkg-config python3 python3-pip rsync tar unzip wget xz-utils zip \
            dwarves repo

      - name: Disk cleanup after dependencies
        run: |
          sudo rm -rf /tmp/*
          df -h

      - name: Prepare ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.workflow }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.workflow }}-
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure ccache
        shell: bash
        run: |
          mkdir -p "${CCACHE_DIR}"
          ccache --zero-stats || true
          ccache --max-size="${{ github.event.inputs.ccachesize || '100G' }}"

      - name: Disk cleanup after cache setup
        run: |
          sudo rm -rf /var/lib/docker
          df -h

      - name: Clone OnePlus kernel sources (from manifest)
        shell: bash
        run: |
          set -euxo pipefail
          # OnePlus OSS remotes
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8450 \
            kernel_platform/common
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_oneplus_sm8450 \
            kernel_platform/msm-kernel
          # modules + devicetree (root path per manifest)
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8450 \
            modules_and_dt

      - name: Final disk cleanup
        run: |
          sudo rm -rf /tmp/*
          df -h

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: kernel-output
          path: out/msm-kernel/dist
