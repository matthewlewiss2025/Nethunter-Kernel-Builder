Copilot said: There could be multiple reasons you're not
There could be multiple reasons you're not getting any artifacts to download in your workflow for NetHunter Kernel - OnePlus 10 Pro. Let's go through them step-by-step to determine possible causes:

1. Artifacts Are Not Being Uploaded
To make artifacts available for download after a workflow completes, you must explicitly upload them using the actions/upload-artifact step.

What to Add:

Check if there's an actions/upload-artifact step in your workflow. In the YAML file you've shared, there is no such step. You need to explicitly call this action to collect and upload build artifacts.
Example of How to Upload:

Add the following step to upload files (e.g., kernel images, zips):

YAML
- name: Upload Kernel Artifacts
  uses: actions/upload-artifact@v3
  with:
    name: kernel-build-artifacts
    path: out/msm-kernel/dist
This step should be added at the end of your jobs.build.steps section, after the kernel build completes and artifacts are generated.

Ensure the path points to the directory where your build outputs (artifacts like image files, zips, etc.) are generated. For your case, out/msm-kernel/dist seems to be the distribution directory for your kernel build.

2. Kernel Build Process Might Not Be Writing Outputs to the Expected Directory
Your build job lacks steps to specifically compile the kernel, which might mean:

The kernel compilation process is missing from your workflow.
Even if the build runs, it might not be outputting files to the out/msm-kernel/dist directory (or whatever the target location is).
To Fix: Double-check your kernel build commands. After cloning the kernel source in the "Clone OnePlus kernel sources" step, you’ll need to ensure:

The kernel build process is initiated.
Any .img, .zip, or other build outputs are moved or copied to the appropriate directory.
For example:

YAML
- name: Build Kernel
  shell: bash
  run: |
    export CCACHE_DIR="${CCACHE_DIR}"
    make -C kernel_platform/msm-kernel O=out/msm-kernel distclean
    make -C kernel_platform/msm-kernel O=out/msm-kernel BUILD_CONFIG=${{ github.event.inputs.build_config }}
After running the build, check that the output artifacts exist where expected. If the outputs are misplaced, either specify the correct output locations in the build commands or copy them to out/msm-kernel/dist.

3. Check If the Build Is Failing
Review the workflow logs to make sure the build process is completing successfully.
Look for failures during:
Dependency installations.
Kernel source cloning.
Kernel compilation commands.
If the job fails, no artifacts will be produced.
Troubleshooting Hints:

Logs should show how the kernel compilation is progressing. If make or equivalent commands fail, debug your kernel build system.
Ensure you've configured and fixed paths for intermediate build outputs (cache files, compiled kernel images, etc.).
4. Cache Configuration Might Be Incorrect
Your ccache setup ensures faster builds but could point to a size issue as it relates to available runner disk space.

To Check:

Ensure ccache --zero-stats and ccache --max-size initialize correctly.
Modify the ccachesize input in your workflow dispatch to ensure it correctly defaults to 100G.
If ccache commands (e.g., ccache --show-stats) are failing, adjust your caching strategy.

5. Incorrect Directory Name for the Final Artifact
The directory out/msm-kernel/dist might differ depending on how kernel build scripts are configured.
Verify the real output directory. If the artifacts are not in dist, investigate paths relative to O=out/msm-kernel.
Summary of Required Fixes
To resolve the issue, here’s what you need to do:

a. Add an Upload Step for Artifacts:
YAML
- name: Upload Kernel Artifacts
  uses: actions/upload-artifact@v3
  with:
    name: kernel-build-artifacts
    path: out/msm-kernel/dist
b. Verify and Add the Kernel Build Step:
YAML
- name: Build Kernel
  shell: bash
  run: |
    export CCACHE_DIR="${CCACHE_DIR}"
    make -C kernel_platform/msm-kernel O=out/msm-kernel distclean
    make -C kernel_platform/msm-kernel O=out/msm-kernel BUILD_CONFIG=${{ github.event.inputs.build_config }}
c. Troubleshoot Build Failures:
Ensure the job logs confirm steps such as:

Success in dependency installation.
Success in kernel build commands.
Successful uploads of artifacts.
Feel free to ask if you'd like further debugging help!

