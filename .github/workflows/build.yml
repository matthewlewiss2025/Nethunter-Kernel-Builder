name: NetHunter Kernel - OnePlus 10 Pro (NE2215) OOS 14

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: BUILD_CONFIG to use (default waipio)
        required: true
        default: kernel_platform/common/build.config.msm.waipio
      package_anykernel:
        description: Also package flashable AnyKernel3 zip
        required: false
        default: "true"
      ccachesize:
        description: ccache max size (e.g. 15G)
        required: false
        default: 15G

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-22.04
    env:
      # Build metadata
      KBUILD_BUILD_USER: "github-actions"
      KBUILD_BUILD_HOST: "github.com"
      # Paths pinned by manifest
      CLANG_DIR: kernel_platform/prebuilts-master/clang/host/linux-x86
      GCC_HOST_DIR: kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8
      DIST_DIR: out/msm-kernel/dist
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      # Device labeling for artifacts
      DEVICE_CODENAME: "NE2215"
      DEVICE_FRIENDLY: "OnePlus10Pro"
      ANDROID_VERSION: "OOS14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache clang curl flex git jq libelf-dev \
            liblz4-tool libncurses5-dev libssl-dev lld llvm lsb-release \
            pkg-config python3 python3-pip rsync tar unzip wget xz-utils zip \
            dwarves repo

      - name: Prepare ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.workflow }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ runner.arch }}-${{ github.workflow }}-
            ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure ccache
        shell: bash
        run: |
          mkdir -p "${CCACHE_DIR}"
          ccache --zero-stats || true
          ccache --max-size="${{ github.event.inputs.ccachesize || '15G' }}"

      - name: Clone OnePlus kernel sources (from manifest)
        shell: bash
        run: |
          set -euxo pipefail
          # OnePlus OSS remotes
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8450 \
            kernel_platform/common
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_oneplus_sm8450 \
            kernel_platform/msm-kernel
          # modules + devicetree (root path per manifest)
          git clone \
            -b oneplus/sm8450_u_14.0.0_oneplus_10pro \
            https://github.com/OnePlusOSS/android_kernel_modules_and_devicetree_oneplus_sm8450 \
            modules_and_dt
          # Move content from helper folder to workspace root if needed
          shopt -s dotglob
          if [ -d modules_and_dt ] && [ -n "$(ls -A modules_and_dt)" ]; then
            cp -a modules_and_dt/* .
          fi
          rm -rf modules_and_dt

      - name: Clone Qualcomm/CodeLinaro prebuilts (from manifest SHAs)
        shell: bash
        run: |
          set -euxo pipefail
          clone_at_rev () {
            local url="$1" path="$2" rev="$3"
            git clone "$url" "$path"
            pushd "$path"
              # Ensure we have the exact commit; fetch if not in initial clone
              git fetch --depth=1 origin "$rev" || git fetch origin "$rev"
              git checkout "$rev"
            popd
          }
          # From manifest:
          clone_at_rev https://git.codelinaro.org/clo/la/kernel/prebuilts/build-tools.git \
            kernel_platform/prebuilts/kernel-build-tools \
            10ab783184f77d3ea15bf666426a7138b0f62bfc
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/external/dtc.git \
            kernel_platform/external/dtc \
            deb932d81061c472e8bb2648a409a456e6e84997
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/kernel/prebuilts/mainline/arm64.git \
            kernel_platform/kernel/prebuilts/mainline/arm64 \
            de12e10cfe8d67d5c0627069306fda939f52154a
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/prebuilts/build-tools.git \
            kernel_platform/prebuilts/build-tools \
            846214bd11004546cd3fc2590c73c628fcd6778c
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/system/tools/mkbootimg.git \
            kernel_platform/tools/mkbootimg \
            08410f46318f3f301b96ed058466ab0dde0b050b
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/prebuilts-master/clang/host/linux-x86.git \
            kernel_platform/prebuilts-master/clang/host/linux-x86 \
            0fc3d01a780023469b7acc18c56a9cf5099a6d6c
          clone_at_rev https://git.codelinaro.org/clo/la/kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8.git \
            kernel_platform/prebuilts/gcc/linux-x86/host/x86_64-linux-glibc2.17-4.8 \
            c9f87ae369034b4942536a1c5bd62e4cd1d828e3

      - name: Apply linkfiles from manifest
        shell: bash
        run: |
          set -euxo pipefail
          ln -sf "${PWD}/kernel_platform/msm-kernel/build.config.msm.waipio" \
                 "${PWD}/kernel_platform/common/build.config.msm.waipio"
          ln -sf "${PWD}/kernel_platform/msm-kernel/build.config.msm.waipio.tuivm" \
                 "${PWD}/kernel_platform/common/build.config.msm.waipio.tuivm"
          ln -sf "${PWD}/kernel_platform/msm-kernel/build.config.msm.lahaina" \
                 "${PWD}/kernel_platform/common/build.config.msm.lahaina"

      - name: Set up LLVM and PATH
        shell: bash
        run: |
          set -euxo pipefail
          echo "${GITHUB_WORKSPACE}/${CLANG_DIR}/bin" >> $GITHUB_PATH
          echo "${GITHUB_WORKSPACE}/${GCC_HOST_DIR}/bin" >> $GITHUB_PATH

      - name: Build kernel (waipio / SM8450)
        shell: bash
        env:
          BUILD_CONFIG: ${{ github.event.inputs.build_config }}
          CCACHE_EXEC: ccache
        run: |
          set -euxo pipefail
          BUILD_SH=""
          if [ -x kernel_platform/build/build.sh ]; then
            BUILD_SH=kernel_platform/build/build.sh
          elif [ -x kernel_platform/msm-kernel/build/build.sh ]; then
            BUILD_SH=kernel_platform/msm-kernel/build/build.sh
          else
            echo "ERROR: Could not find build.sh"; ls -R kernel_platform || true; exit 1
          fi
          export LLVM=1
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH="${GITHUB_WORKSPACE}/${CLANG_DIR}/bin:${GITHUB_WORKSPACE}/${GCC_HOST_DIR}/bin:${PATH}"
          export CC=clang
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export READELF=llvm-readelf
          export STRIP=llvm-strip
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export DTC_EXT=${GITHUB_WORKSPACE}/kernel_platform/external/dtc/dtc
          echo "Using BUILD_CONFIG=${BUILD_CONFIG}"
          chmod +x "${BUILD_SH}"
          "${BUILD_SH}" -j"$(nproc)" --no-mrproper
          echo "Build finished. Contents of dist:"
          ls -al "${DIST_DIR}" || true

      - name: Create AnyKernel3 package
        if: ${{ github.event.inputs.package_anykernel == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          DIST="${DIST_DIR}"
          test -d "${DIST}" || { echo "Dist dir not found: ${DIST}"; exit 1; }
          IMG_GZ_DTB="${DIST}/Image.gz-dtb"
          DTBO_IMG="${DIST}/dtbo.img"
          MODULES_TAR="${DIST}/modules.tar.gz"
          test -f "${IMG_GZ_DTB}" || { echo "Missing Image.gz-dtb in dist"; ls -al "${DIST}"; exit 1; }
          rm -rf AnyKernel3
          git clone https://github.com/osm0sis/AnyKernel3.git
          pushd AnyKernel3
            cp "${IMG_GZ_DTB}" Image.gz-dtb
            if [ -f "${DTBO_IMG}" ]; then
              cp "${DTBO_IMG}" dtbo.img
            fi
            if [ -f "${MODULES_TAR}" ]; then
              mkdir -p modules
              tar -xzf "${MODULES_TAR}" -C modules
            fi
            ZIP_NAME="NetHunter-${DEVICE_FRIENDLY}-${ANDROID_VERSION}-${DEVICE_CODENAME}-$(date +%Y%m%d)-${GITHUB_SHA:0:7}.zip"
            zip -r9 "../${ZIP_NAME}" . -x ".git/*" -x "*.zip"
          popd
          echo "ANYKERNEL_ZIP=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ env.DEVICE_CODENAME }}-${{ github.sha }}
          path: |
            ${{ env.DIST_DIR }}/*
          if-no-files-found: warn
          retention-days: 14

      - name: Upload AnyKernel3 ZIP
        if: ${{ github.event.inputs.package_anykernel == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: anykernel3-${{ env.DEVICE_CODENAME }}-${{ github.sha }}
          path: |
            ${{ github.workspace }}/NetHunter-*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Show ccache stats
        if: always()
        shell: bash
        run: |
          ccache --show-stats || true
