name: Nethunter Kernel Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout code from your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up the Android NDK
      - name: Set up Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r23-linux.zip
          unzip android-ndk-r23-linux.zip
          rm android-ndk-r23-linux.zip
          echo "NDK setup complete."

      # Install dependencies (e.g., clang, make, etc.)
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang make gcc bc libssl-dev libncurses-dev

      # Clone kernel and device tree sources
      - name: Clone kernel source
        run: |
          git clone https://github.com/OnePlusOSS/android_kernel_oneplus_sm8450 -b oneplus/sm8450_u_14.0.0_oneplus_10pro kernel
          git clone https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8450 -b oneplus/sm8450_u_14.0.0_oneplus_10pro common
          cd kernel && ln -s ../common/build.config.msm.waipio build.config

      # Set up the device tree compiler
      - name: Set up DTC
        run: |
          git clone https://android.googlesource.com/platform/external/dtc --depth 1
          cd dtc && ln -s dtc-parser.tab.h dtc-parser.h

      # Build kernel
      - name: Build kernel
        run: |
          cd kernel
          make ARCH=arm64 -j$(nproc) O=out

      # Optionally, you can upload artifacts (e.g., kernel image) after build
      - name: Upload Kernel Image
        uses: actions/upload-artifact@v2
        with:
          name: kernel-image
          path: kernel/out/arch/arm64/boot/Image.gz
